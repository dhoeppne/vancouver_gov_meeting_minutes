name: Email new reports

on:
  push:
    branches: [main]
    paths:
      - '**/reports/*.pdf'

jobs:
  email:
    runs-on: ubuntu-latest
    env:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect new report PDFs in this push
        id: changed
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            BEFORE=$(git rev-parse "${{ github.sha }}~1")
          fi
          FILES=$(git diff --name-only --diff-filter=AM "$BEFORE" "${{ github.sha }}" -- '*/reports/*.pdf' | paste -sd, -)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "New report PDFs: $FILES"

      # Skipped (not failed) until the SMTP_* repo secrets are configured.
      - name: Email reports
        if: steps.changed.outputs.files != '' && env.SMTP_SERVER != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: Vancouver Meeting Reports <${{ secrets.SMTP_USERNAME }}>
          to: tech@davidhoeppner.ca
          subject: 'New Vancouver meeting reports: ${{ github.event.head_commit.message }}'
          body: |
            New meeting report PDFs were committed:

            ${{ steps.changed.outputs.files }}

            Repo: ${{ github.server_url }}/${{ github.repository }}
          attachments: ${{ steps.changed.outputs.files }}
